<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>高德通勤卡片 · 静态预览</title>
  <style>
    :root {
      --primary-color: #2196f3;
      --primary-text-color: #212121;
      --secondary-text-color: #757575;
      --divider-color: #e0e0e0;
      --ha-card-background: #fff;
      --card-background-color: #fff;
      --ha-card-border-radius: 12px;
      --ha-card-box-shadow: 0 2px 8px rgba(0,0,0,.1);
      --secondary-background-color: #f9f9f9;
      --primary-font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    body {
      margin: 0;
      padding: 24px 16px 48px;
      font-family: var(--primary-font-family);
      background: linear-gradient(160deg, #eceff1 0%, #cfd8dc 100%);
      min-height: 100vh;
    }
    .page-title {
      text-align: center;
      color: #455a64;
      font-size: 15px;
      margin-bottom: 20px;
      font-weight: 600;
    }
    .page-hint {
      text-align: center;
      color: #78909c;
      font-size: 12px;
      margin-bottom: 28px;
      max-width: 520px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.5;
    }
    .preview-wrap {
      max-width: 420px;
      margin: 0 auto 40px;
    }
    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #78909c;
      margin-bottom: 10px;
      font-weight: 600;
    }

    /* ── 与 amap-commute-card 一致的卡片骨架 ── */
    .card {
      background: var(--ha-card-background);
      border-radius: var(--ha-card-border-radius);
      box-shadow: var(--ha-card-box-shadow);
      overflow: hidden;
    }
    .card-header {
      padding: 14px 16px 8px;
      font-size: 14px;
      font-weight: 600;
      color: var(--secondary-text-color);
      letter-spacing: 0.04em;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .card-header svg { flex-shrink: 0; color: var(--primary-color); }
    .route-info {
      padding: 8px 16px 14px;
      display: flex;
      align-items: center;
      min-height: 60px;
    }
    .location {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 0 0 auto;
      min-width: 68px;
      max-width: 96px;
    }
    .location-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-bottom: 4px;
    }
    .location-dot.origin { background: #4caf50; }
    .location-dot.dest { background: #f44336; }
    .location-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--primary-text-color);
      text-align: center;
      max-width: 90px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .route-middle {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 8px;
    }
    .duration-badge {
      background: var(--primary-color);
      color: #fff;
      border-radius: 20px;
      padding: 5px 16px;
      font-size: 19px;
      font-weight: 700;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(33, 150, 243, 0.3);
      margin-bottom: 7px;
      position: relative;
    }
    .duration-badge::after {
      content: "📈";
      position: absolute;
      right: -2px;
      top: -8px;
      font-size: 11px;
      opacity: 0.7;
    }
    .route-meta {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }
    .meta-item {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      border-radius: 6px;
      padding: 3px 9px;
      border: 1px solid var(--divider-color);
      background: var(--secondary-background-color);
      font-size: 12px;
      color: var(--secondary-text-color);
    }
    .traffic-badge {
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      background: #ff8800;
    }
    .map-container {
      position: relative;
      width: 100%;
      height: 240px;
      background: #e8edf2;
      overflow: hidden;
    }
    .map-fake {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, #cfe8f4 0%, #e8edf2 45%, #dde4ea 100%);
    }
    .map-route {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .zoom-btns {
      position: absolute;
      right: 10px;
      top: 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      z-index: 10;
    }
    .zoom-btn {
      width: 30px;
      height: 30px;
      border-radius: 6px;
      border: none;
      cursor: default;
      background: rgba(255, 255, 255, 0.92);
      color: #444;
      font-size: 18px;
      line-height: 1;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.18);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .legend {
      display: flex;
      gap: 8px;
      padding: 6px 14px 10px;
      flex-wrap: wrap;
      border-top: 1px solid var(--divider-color);
      justify-content: flex-end;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--secondary-text-color);
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 2px;
    }

    /* 弹层预览 */
    .popover-mock {
      margin-top: 8px;
      border-radius: 14px;
      background: #fff;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
      padding: 14px;
      border: 1px solid #eee;
    }
    .popover-title {
      font-size: 15px;
      font-weight: 700;
      color: #222;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .popover-title span { font-size: 12px; font-weight: 400; color: #999; }
    .route-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
      overflow-x: auto;
      padding-bottom: 2px;
    }
    .route-tab {
      flex: 0 0 auto;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      border: 1.5px solid #ddd;
      background: #fff;
      color: #666;
      white-space: nowrap;
    }
    .route-tab.active {
      border-color: var(--primary-color);
      background: var(--primary-color);
      color: #fff;
    }
    .stat-row {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .stat-box {
      flex: 1;
      min-width: 56px;
      text-align: center;
      padding: 9px 6px;
      background: #f7f9ff;
      border-radius: 10px;
    }
    .stat-val {
      font-size: 17px;
      font-weight: 700;
      color: var(--primary-color);
    }
    .stat-lbl {
      font-size: 11px;
      color: #aaa;
      margin-top: 2px;
    }
    .sec-title {
      font-size: 12px;
      font-weight: 600;
      color: #555;
      margin: 14px 0 7px;
    }
    .traffic-bar {
      height: 10px;
      border-radius: 5px;
      overflow: hidden;
      display: flex;
      margin-bottom: 8px;
    }
    .traffic-bar-seg { height: 100%; }
    .detail-map-wrap {
      position: relative;
      width: 100%;
      height: 180px;
      border-radius: 10px;
      overflow: hidden;
      background: #e8edf2;
    }
  </style>
</head>
<body>
  <div class="page-title">高德通勤时间卡片 · 静态预览</div>
  <p class="page-hint">
    本页为演示布局与配色，不加载真实高德地图。将文件放到 HA <code>/config/www/</code> 后可通过
    <code>http://&lt;HA地址&gt;/local/amap-commute-card-preview.html</code> 访问。
  </p>

  <div class="preview-wrap">
    <div class="section-label">主卡片（Lovelace）</div>
    <div class="card">
      <div class="card-header">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
        <span>今日通勤</span>
      </div>
      <div class="route-info">
        <div class="location">
          <div class="location-dot origin"></div>
          <div class="location-name" title="家">家</div>
        </div>
        <div class="route-middle">
          <div class="duration-badge">42 分钟</div>
          <div class="route-meta">
            <span class="meta-item">📍 18.6 km</span>
            <span class="meta-item">🚦 12灯</span>
            <span class="traffic-badge">缓行</span>
          </div>
        </div>
        <div class="location">
          <div class="location-dot dest"></div>
          <div class="location-name" title="公司">公司</div>
        </div>
      </div>
      <div class="map-container">
        <div class="map-fake"></div>
        <svg class="map-route" viewBox="0 0 400 240" preserveAspectRatio="xMidYMid slice">
          <defs>
            <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" style="stop-color:#00C851"/>
              <stop offset="35%" style="stop-color:#FF8800"/>
              <stop offset="70%" style="stop-color:#FF4444"/>
              <stop offset="100%" style="stop-color:#00C851"/>
            </linearGradient>
          </defs>
          <path d="M40 180 Q120 40 200 100 T360 60" fill="none" stroke="url(#lg)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.92"/>
          <circle cx="40" cy="180" r="10" fill="#4caf50" stroke="#fff" stroke-width="3"/>
          <circle cx="360" cy="60" r="10" fill="#f44336" stroke="#fff" stroke-width="3"/>
        </svg>
        <div class="zoom-btns">
          <div class="zoom-btn">＋</div>
          <div class="zoom-btn">－</div>
        </div>
      </div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#00C851"></div><span>畅通</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#FF8800"></div><span>缓行</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#FF4444"></div><span>拥堵</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#CC0000"></div><span>严重拥堵</span></div>
      </div>
    </div>

    <div class="section-label" style="margin-top:28px">路线详情弹层（点击距离 / 红绿灯后）</div>
    <div class="popover-mock">
      <div class="popover-title">
        <span style="width:4px;height:18px;background:#2196F3;border-radius:2px;display:inline-block"></span>
        行车路线 <span>家 → 公司</span>
      </div>
      <div class="route-tabs">
        <div class="route-tab active">推荐路线<br><span style="font-size:10px;opacity:.9">42 分钟</span></div>
        <div class="route-tab">推荐2<br><span style="font-size:10px">45 分钟</span></div>
        <div class="route-tab">推荐3<br><span style="font-size:10px">48 分钟</span></div>
      </div>
      <div class="stat-row">
        <div class="stat-box"><div class="stat-val">42 分钟</div><div class="stat-lbl">预计用时</div></div>
        <div class="stat-box"><div class="stat-val">18.6 km</div><div class="stat-lbl">总距离</div></div>
        <div class="stat-box"><div class="stat-val">12</div><div class="stat-lbl">红绿灯</div></div>
        <div class="stat-box"><div class="stat-val" style="color:#00C851">免费</div><div class="stat-lbl">收费</div></div>
      </div>
      <div class="sec-title">路况分布</div>
      <div class="traffic-bar">
        <div class="traffic-bar-seg" style="flex:2;background:#00C851"></div>
        <div class="traffic-bar-seg" style="flex:1;background:#FF8800"></div>
        <div class="traffic-bar-seg" style="flex:1.5;background:#FF4444"></div>
        <div class="traffic-bar-seg" style="flex:1;background:#00C851"></div>
      </div>
      <div class="sec-title">路线地图</div>
      <div class="detail-map-wrap">
        <div class="map-fake" style="position:absolute;inset:0"></div>
        <svg style="position:absolute;inset:0;width:100%;height:100%" viewBox="0 0 400 180" preserveAspectRatio="xMidYMid slice">
          <path d="M30 140 Q150 30 370 50" fill="none" stroke="#2196F3" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
        </svg>
      </div>
    </div>
  </div>
</body>
</html>
